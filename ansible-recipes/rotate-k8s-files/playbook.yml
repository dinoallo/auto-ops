---
- name: Phase 1 - Back up Kubernetes configuration on master nodes and kubelet files on all nodes
  hosts: masters:workers
  become: true
  tasks:
      - name: Back up the /etc/kubernetes directory
        ansible.builtin.command: cp -r /etc/kubernetes /etc/kubernetes.bak-{{ ansible_date_time.iso8601_basic_short }}
        args:
            creates: /etc/kubernetes.bak-*
        when: "'masters' in group_names"

      - name: Check whether the kubelet kubeconfig exists
        ansible.builtin.stat:
            path: /etc/kubernetes/kubelet.conf
        register: kubelet_conf_stat

      - name: Back up the kubelet kubeconfig
        ansible.builtin.command: cp -a /etc/kubernetes/kubelet.conf /etc/kubernetes/kubelet.conf.bak-{{ ansible_date_time.iso8601_basic_short }}
        args:
            creates: /etc/kubernetes/kubelet.conf.bak-{{ ansible_date_time.iso8601_basic_short }}
        when: kubelet_conf_stat.stat.exists

      - name: Check whether the kubelet PKI directory exists
        ansible.builtin.stat:
            path: /var/lib/kubelet/pki
        register: kubelet_pki_backup_stat

      - name: Back up the kubelet PKI directory
        ansible.builtin.command: cp -a /var/lib/kubelet/pki /var/lib/kubelet/pki.bak-{{ ansible_date_time.iso8601_basic_short }}
        args:
            creates: /var/lib/kubelet/pki.bak-{{ ansible_date_time.iso8601_basic_short }}
        when: kubelet_pki_backup_stat.stat.isdir

      - name: Check whether the optional kubeadm ClusterConfiguration file exists on the Ansible control node
        ansible.builtin.stat:
            path: "{{ kubeadm_cluster_configuration_src }}"
        register: kubeadm_cluster_configuration_src_stat
        delegate_to: localhost
        become: false
        run_once: true
        when: kubeadm_cluster_configuration_src | default('') | length > 0

      - name: Fail when the optional kubeadm ClusterConfiguration file is missing
        ansible.builtin.fail:
            msg: "kubeadm_cluster_configuration_src points to {{ kubeadm_cluster_configuration_src }}, but that file does not exist on the Ansible control node."
        when:
            - kubeadm_cluster_configuration_src | default('') | length > 0
            - not kubeadm_cluster_configuration_src_stat.stat.exists

      - name: Stage the optional kubeadm ClusterConfiguration file on master nodes
        ansible.builtin.copy:
            src: "{{ kubeadm_cluster_configuration_src }}"
            dest: "{{ kubeadm_cluster_configuration_dest | default('/etc/kubernetes/kubeadm-rotate-config.yaml') }}"
            mode: "0600"
        when: kubeadm_cluster_configuration_src | default('') | length > 0

- name: Phase 2 - Generate a new CA / certificates / sa key on the first master node
  hosts: master_first
  become: true
  tasks:
      - name: Find existing kubeconfig paths
        ansible.builtin.find:
            paths: /etc/kubernetes
            patterns: "*.conf"
            recurse: false
            file_type: any
        register: kubeconfig_paths

      - name: Remove old kubeconfig paths
        ansible.builtin.file:
            path: "{{ item.path }}"
            state: absent
        loop: "{{ kubeconfig_paths.files }}"
        loop_control:
            label: "{{ item.path }}"

      - name: Remove old CA and component certificates (including sa.key/sa.pub)
        ansible.builtin.shell: |
            rm -f /etc/kubernetes/pki/ca.*
            rm -f /etc/kubernetes/pki/apiserver*
            rm -f /etc/kubernetes/pki/front-proxy*
            rm -f /etc/kubernetes/pki/sa.*

      - name: Regenerate all certificates, including a new CA
        ansible.builtin.command:
            argv: "{{ ['kubeadm', 'init', 'phase', 'certs', 'all'] + (['--config', kubeadm_cluster_configuration_dest | default('/etc/kubernetes/kubeadm-rotate-config.yaml')] if kubeadm_cluster_configuration_src | default('') | length > 0 else []) }}"

      - name: Regenerate kubeconfig files
        ansible.builtin.command:
            argv: "{{ ['kubeadm', 'init', 'phase', 'kubeconfig', 'all'] + (['--config', kubeadm_cluster_configuration_dest | default('/etc/kubernetes/kubeadm-rotate-config.yaml')] if kubeadm_cluster_configuration_src | default('') | length > 0 else []) }}"

      - name: Ensure the root kubeconfig directory exists
        ansible.builtin.file:
            path: /root/.kube
            state: directory
            mode: "0700"

      - name: Update the local admin kubeconfig
        ansible.builtin.copy:
            src: /etc/kubernetes/admin.conf
            dest: /root/.kube/config
            remote_src: true

- name: Phase 3 - Fetch the newly generated CA from the first master to the Ansible control node
  hosts: master_first
  become: true
  tasks:
      - name: Ensure the local CA staging directory exists
        ansible.builtin.file:
            path: /tmp/k8s-ca-sync
            state: directory
            mode: "0700"
        delegate_to: localhost
        become: false
        run_once: true

      - name: Fetch the CA and related core files
        ansible.builtin.fetch:
            src: "/etc/kubernetes/pki/{{ item }}"
            dest: /tmp/k8s-ca-sync/
            flat: true
        loop:
            - ca.crt
            - ca.key
            - front-proxy-ca.crt
            - front-proxy-ca.key
            - sa.key
            - sa.pub

- name: Phase 4 - Distribute the CA to the remaining master nodes and generate node-specific component certificates
  hosts: master_rest
  become: true
  tasks:
      - name: Find existing kubeconfig paths
        ansible.builtin.find:
            paths: /etc/kubernetes
            patterns: "*.conf"
            recurse: false
            file_type: any
        register: kubeconfig_paths

      - name: Remove selected component certificates while keeping the CA directory for replacement
        ansible.builtin.shell: |
            rm -f /etc/kubernetes/pki/apiserver*
            rm -f /etc/kubernetes/pki/front-proxy-client*

      - name: Remove old kubeconfig paths
        ansible.builtin.file:
            path: "{{ item.path }}"
            state: absent
        loop: "{{ kubeconfig_paths.files }}"
        loop_control:
            label: "{{ item.path }}"

      - name: Distribute the new CA to these nodes
        ansible.builtin.copy:
            src: "/tmp/k8s-ca-sync/{{ item }}"
            dest: "/etc/kubernetes/pki/{{ item }}"
            mode: "0600"
        loop:
            - ca.crt
            - ca.key
            - front-proxy-ca.crt
            - front-proxy-ca.key
            - sa.key
            - sa.pub

      - name: Generate node certificates based on the synchronized CA
        ansible.builtin.command:
            argv: "{{ ['kubeadm', 'init', 'phase', 'certs', 'all'] + (['--config', kubeadm_cluster_configuration_dest | default('/etc/kubernetes/kubeadm-rotate-config.yaml')] if kubeadm_cluster_configuration_src | default('') | length > 0 else []) }}"

      - name: Regenerate kubeconfig files
        ansible.builtin.command:
            argv: "{{ ['kubeadm', 'init', 'phase', 'kubeconfig', 'all'] + (['--config', kubeadm_cluster_configuration_dest | default('/etc/kubernetes/kubeadm-rotate-config.yaml')] if kubeadm_cluster_configuration_src | default('') | length > 0 else []) }}"

      - name: Ensure the root kubeconfig directory exists
        ansible.builtin.file:
            path: /root/.kube
            state: directory
            mode: "0700"

      - name: Update the local admin kubeconfig
        ansible.builtin.copy:
            src: /etc/kubernetes/admin.conf
            dest: /root/.kube/config
            remote_src: true

- name: Phase 5 - Reset master kubelet client credentials and restart control plane components
  hosts: masters
  become: true
  tasks:
      - name: Check whether the kubelet PKI directory exists
        ansible.builtin.stat:
            path: /var/lib/kubelet/pki
        register: kubelet_pki_dir

      - name: Find existing kubelet client certificate paths
        ansible.builtin.find:
            paths: /var/lib/kubelet/pki
            patterns: "kubelet-client*"
            recurse: false
            file_type: any
        register: kubelet_client_paths
        when: kubelet_pki_dir.stat.exists

      - name: Remove old kubelet client certificate paths
        ansible.builtin.file:
            path: "{{ item.path }}"
            state: absent
        loop: "{{ kubelet_client_paths.files | default([]) }}"
        loop_control:
            label: "{{ item.path }}"

      - name: Restart kubelet
        ansible.builtin.systemd:
            name: kubelet
            state: restarted

      - name: Force-remove existing static control plane pod containers using containerd/crictl
        ansible.builtin.shell: >
            crictl ps | grep -E 'kube-apiserver|kube-controller-manager|kube-scheduler' | awk '{print $1}' | xargs -r crictl rm -f
        ignore_errors: true
        # If you are using Docker, replace crictl with docker.

- name: Phase 6 - Refresh bootstrap discovery and generate a new token for worker nodes to join
  hosts: master_first
  become: true
  tasks:
      - name: Refresh bootstrap token discovery information with the rotated CA
        ansible.builtin.command:
            argv: "{{ ['kubeadm', 'init', 'phase', 'bootstrap-token', '--kubeconfig', '/etc/kubernetes/admin.conf', '--skip-token-print'] + (['--config', kubeadm_cluster_configuration_dest | default('/etc/kubernetes/kubeadm-rotate-config.yaml')] if kubeadm_cluster_configuration_src | default('') | length > 0 else []) }}"
        register: bootstrap_token_refresh
        retries: 10
        delay: 6
        until: bootstrap_token_refresh.rc == 0

      - name: Generate the join command
        ansible.builtin.command:
            argv: "{{ ['kubeadm', 'token', 'create', '--print-join-command'] + (['--config', kubeadm_cluster_configuration_dest | default('/etc/kubernetes/kubeadm-rotate-config.yaml')] if kubeadm_cluster_configuration_src | default('') | length > 0 else []) }}"
        register: kubeadm_join_cmd
        retries: 10
        delay: 6
        until: kubeadm_join_cmd.rc == 0

      - name: Set the join command as a shared variable
        ansible.builtin.set_fact:
            join_command: "{{ kubeadm_join_cmd.stdout | trim }}"

- name: Phase 7 - Finalize master kubelet client certificate rotation
  hosts: masters
  become: true
  tasks:
      - name: Wait for kubelet to obtain a new client certificate
        ansible.builtin.wait_for:
            path: /var/lib/kubelet/pki/kubelet-client-current.pem
            state: present
            timeout: 180

      - name: Finalize kubelet client certificate rotation
        ansible.builtin.command:
            argv: "{{ ['kubeadm', 'init', 'phase', 'kubelet-finalize', 'all'] + (['--config', kubeadm_cluster_configuration_dest | default('/etc/kubernetes/kubeadm-rotate-config.yaml')] if kubeadm_cluster_configuration_src | default('') | length > 0 else []) }}"
        register: kubelet_finalize
        retries: 10
        delay: 6
        until: kubelet_finalize.rc == 0

      - name: Restart kubelet after finalizing client certificate rotation
        ansible.builtin.systemd:
            name: kubelet
            state: restarted

- name: Phase 8 - Clean up worker nodes and rejoin them to the cluster
  hosts: workers
  become: true
  tasks:
      - name: Stop kubelet before resetting worker state
        ansible.builtin.systemd:
            name: kubelet
            state: stopped

      - name: Reset kubeadm state before rejoining the cluster
        ansible.builtin.command: kubeadm reset -f

      - name: Remove old kubelet configuration path
        ansible.builtin.file:
            path: /etc/kubernetes/kubelet.conf
            state: absent

      - name: Remove old bootstrap kubelet configuration path
        ansible.builtin.file:
            path: /etc/kubernetes/bootstrap-kubelet.conf
            state: absent

      - name: Remove old kubelet local config file
        ansible.builtin.file:
            path: /var/lib/kubelet/config.yaml
            state: absent

      - name: Remove old CA file
        ansible.builtin.file:
            path: /etc/kubernetes/pki/ca.crt
            state: absent

      - name: Rejoin the cluster using the join command
        ansible.builtin.command: "{{ hostvars[groups['master_first'][0]]['join_command'] | trim }}"

      - name: Wait for kubeadm join to recreate the kubelet local config file
        ansible.builtin.wait_for:
            path: /var/lib/kubelet/config.yaml
            state: present
            timeout: 180

      - name: Restart kubelet on worker nodes
        ansible.builtin.systemd:
            name: kubelet
            state: restarted

- name: Phase 9 - Clean up temporary certificate files on the Ansible control node
  hosts: localhost
  connection: local
  tasks:
      - name: Remove locally cached CA credentials
        ansible.builtin.file:
            path: /tmp/k8s-ca-sync
            state: absent
