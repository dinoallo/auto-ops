---
- name: Create VM disk snapshots on Volcengine
  hosts: "{{ target_hosts | default('localhost') }}"
  connection: local
  gather_facts: false
  vars:
    provider_name: volcengine
  tasks:
    - name: Reject check mode
      ansible.builtin.fail:
        msg: >-
          This recipe creates Volcengine snapshots and does not support --check.
      when: ansible_check_mode

    - name: Validate target instances
      ansible.builtin.assert:
        that:
          - target_instances is defined
          - target_instances is sequence
          - target_instances is not string
          - target_instances | length > 0
        fail_msg: Set target_instances to a non-empty list of ECS instance identifiers.

    - name: Validate snapshot name prefix
      ansible.builtin.assert:
        that:
          - snapshot_name_prefix is defined
          - snapshot_name_prefix is string
          - snapshot_name_prefix | length > 0
        fail_msg: Set snapshot_name_prefix to a non-empty string.

    - name: Validate Volcengine region
      ansible.builtin.assert:
        that:
          - volcengine_region is defined
          - volcengine_region is string
          - volcengine_region | length > 0
        fail_msg: Set volcengine_region to the target region.

    - name: Validate optional data disk filter
      ansible.builtin.assert:
        that:
          - data_disk_ids is not defined or (data_disk_ids is sequence and data_disk_ids is not string)
        fail_msg: Set data_disk_ids to a list when limiting the snapshot scope.

    - name: Validate optional snapshot tags
      ansible.builtin.assert:
        that:
          - snapshot_tags is not defined or snapshot_tags is mapping or (snapshot_tags is sequence and snapshot_tags is not string)
        fail_msg: >-
          Set snapshot_tags to a mapping like {"env":"dev"} or a list of tag objects.

    - name: Validate include boot disk toggle
      ansible.builtin.assert:
        that:
          - (include_boot_disk | default(true)) in [true, false]
        fail_msg: Set include_boot_disk to true or false.

    - name: Validate consistency group toggle
      ansible.builtin.assert:
        that:
          - (use_consistency_group_snapshot | default(false)) in [true, false]
        fail_msg: Set use_consistency_group_snapshot to true or false.

    - name: Validate wait toggle
      ansible.builtin.assert:
        that:
          - (wait_for_snapshot_ready | default(true)) in [true, false]
        fail_msg: Set wait_for_snapshot_ready to true or false.

    - name: Validate timeout override
      ansible.builtin.assert:
        that:
          - snapshot_ready_timeout_seconds is not defined or (snapshot_ready_timeout_seconds | int) > 0
        fail_msg: Set snapshot_ready_timeout_seconds to a positive integer.

    - name: Validate polling override
      ansible.builtin.assert:
        that:
          - snapshot_poll_interval_seconds is not defined or (snapshot_poll_interval_seconds | int) > 0
        fail_msg: Set snapshot_poll_interval_seconds to a positive integer.

    - name: Validate Volcengine snapshot group scope
      ansible.builtin.assert:
        that:
          - target_instances | length == 1
        fail_msg: >-
          Volcengine snapshot consistency groups apply to disks from one ECS instance.
          Set target_instances to a single instance when use_consistency_group_snapshot=true.
      when: use_consistency_group_snapshot | default(false)

    - name: Check Volcengine SDK dependencies
      ansible.builtin.command:
        argv:
          - "{{ ansible_playbook_python }}"
          - -c
          - >-
            from volcenginesdkcore.configuration import Configuration;
            from volcenginesdkecs.api.ecs_api import ECSApi;
            from volcenginesdkstorageebs.api.storage_ebs_api import STORAGEEBSApi
      register: volcengine_sdk_check
      changed_when: false
      failed_when: false

    - name: Fail when Volcengine SDK dependencies are missing
      ansible.builtin.fail:
        msg: >-
          Install the Volcengine Python SDK packages into the Ansible Python environment:
          python -m pip install volcengine-python-sdk
      when: volcengine_sdk_check.rc != 0

    - name: Run the Volcengine snapshot workflow
      ansible.builtin.command:
        argv:
          - "{{ ansible_playbook_python }}"
          - "{{ playbook_dir }}/volcengine_snapshot_recipe.py"
      environment:
        VOLCENGINE_REGION: "{{ volcengine_region }}"
        VOLCENGINE_ACCESS_KEY: "{{ volcengine_access_key | default(lookup('env', 'VOLCENGINE_ACCESS_KEY'), true) }}"
        VOLCENGINE_SECRET_KEY: "{{ volcengine_secret_key | default(lookup('env', 'VOLCENGINE_SECRET_KEY'), true) }}"
        VOLCENGINE_SESSION_TOKEN: "{{ volcengine_session_token | default(lookup('env', 'VOLCENGINE_SESSION_TOKEN'), true) }}"
        RECIPE_VOLCENGINE_PROJECT_NAME: "{{ volcengine_project_name | default('') }}"
        RECIPE_TARGET_INSTANCES_JSON: "{{ target_instances | to_json }}"
        RECIPE_SNAPSHOT_NAME_PREFIX: "{{ snapshot_name_prefix }}"
        RECIPE_INCLUDE_BOOT_DISK: "{{ (include_boot_disk | default(true)) | ternary('true', 'false') }}"
        RECIPE_DATA_DISK_IDS_JSON: "{{ data_disk_ids | default(None) | to_json }}"
        RECIPE_USE_CONSISTENCY_GROUP_SNAPSHOT: "{{ (use_consistency_group_snapshot | default(false)) | ternary('true', 'false') }}"
        RECIPE_WAIT_FOR_SNAPSHOT_READY: "{{ (wait_for_snapshot_ready | default(true)) | ternary('true', 'false') }}"
        RECIPE_SNAPSHOT_DESCRIPTION: "{{ snapshot_description | default('') }}"
        RECIPE_SNAPSHOT_TAGS_JSON: "{{ snapshot_tags | default(None) | to_json }}"
        RECIPE_SNAPSHOT_READY_TIMEOUT_SECONDS: "{{ snapshot_ready_timeout_seconds | default(1800) | string }}"
        RECIPE_SNAPSHOT_POLL_INTERVAL_SECONDS: "{{ snapshot_poll_interval_seconds | default(10) | string }}"
      register: volcengine_snapshot_run
      changed_when: volcengine_snapshot_run.rc == 0
      failed_when: volcengine_snapshot_run.rc != 0

    - name: Parse Volcengine snapshot results
      ansible.builtin.set_fact:
        volcengine_snapshot_result: "{{ volcengine_snapshot_run.stdout | from_json }}"

    - name: Show Volcengine snapshot results
      ansible.builtin.debug:
        var: volcengine_snapshot_result
